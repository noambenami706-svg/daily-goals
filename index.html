<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="המטרות שלי" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <title>המטרות שלי</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .safe-top { height: env(safe-area-inset-top); }
    .safe-bottom { height: env(safe-area-inset-bottom); }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 28px 28px 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .date { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .progress { font-size: 15px; color: #aaa; font-weight: 500; }

    main {
      flex: 1;
      padding: 20px 28px 12px;
      overflow-y: auto;
    }

    .goal-row {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      gap: 14px;
    }

    .checkbox {
      width: 24px;
      height: 24px;
      min-width: 24px;
      border: 2px solid #111;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .checkbox.done { background: #111; }
    .checkbox.done::after { content: '✓'; color: #fff; font-size: 14px; font-weight: 700; }

    input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      font-size: 17px;
      color: #111;
      background: transparent;
      text-align: right;
      font-family: inherit;
      padding: 4px 0;
    }

    input[type="text"]::placeholder { color: #ccc; }
    input[type="text"].done { color: #bbb; text-decoration: line-through; }

    .delete-btn {
      background: none;
      border: none;
      color: #ddd;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      display: none;
    }

    .goal-row:focus-within .delete-btn { display: block; }
    .goal-row.min-goal:focus-within .delete-btn { display: none; }

    footer {
      padding: 12px 28px 24px;
    }

    .add-btn {
      width: 100%;
      padding: 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      background: #fff;
      color: #aaa;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .add-btn:active { border-color: #bbb; }
  </style>
</head>
<body>
  <div class="safe-top"></div>

  <header>
    <span class="date" id="dateDisplay"></span>
    <span class="progress" id="progressDisplay"></span>
  </header>

  <main id="goalsList"></main>

  <footer>
    <button class="add-btn" onclick="addGoal()">+ הוסף מטרה</button>
  </footer>

  <div class="safe-bottom"></div>

  <script>
    const STORAGE_KEY = 'goals_data';

    const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
    const MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function formatDate() {
      const d = new Date();
      return `יום ${DAYS[d.getDay()]}, ${d.getDate()} ב${MONTHS[d.getMonth()]}`;
    }

    function loadGoals() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultGoals();
        const all = JSON.parse(raw);
        const today = all[todayKey()];
        return (today && today.length > 0) ? today : defaultGoals();
      } catch { return defaultGoals(); }
    }

    function defaultGoals() {
      return [
        { id: '1', text: '', done: false },
        { id: '2', text: '', done: false },
        { id: '3', text: '', done: false },
      ];
    }

    function saveGoals(goals) {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const all = raw ? JSON.parse(raw) : {};
        all[todayKey()] = goals;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
      } catch {}
    }

    let goals = loadGoals();

    function render() {
      document.getElementById('dateDisplay').textContent = formatDate();

      const withText = goals.filter(g => g.text.trim());
      const done = withText.filter(g => g.done);
      const prog = document.getElementById('progressDisplay');
      prog.textContent = withText.length > 0 ? `${done.length}/${withText.length}` : '';

      const list = document.getElementById('goalsList');
      list.innerHTML = '';

      goals.forEach((goal, index) => {
        const row = document.createElement('div');
        row.className = 'goal-row' + (index < 3 ? ' min-goal' : '');

        const checkbox = document.createElement('div');
        checkbox.className = 'checkbox' + (goal.done ? ' done' : '');
        checkbox.onclick = () => toggleDone(goal.id);

        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `מטרה ${index + 1}`;
        input.value = goal.text;
        input.className = goal.done ? 'done' : '';
        input.oninput = e => updateText(goal.id, e.target.value);
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') {
            const next = list.querySelectorAll('input')[index + 1];
            if (next) next.focus();
          }
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '✕';
        deleteBtn.onclick = () => removeGoal(goal.id);

        row.appendChild(checkbox);
        row.appendChild(input);
        row.appendChild(deleteBtn);
        list.appendChild(row);
      });
    }

    function toggleDone(id) {
      goals = goals.map(g => g.id === id ? { ...g, done: !g.done } : g);
      saveGoals(goals);
      render();
    }

    function updateText(id, text) {
      goals = goals.map(g => g.id === id ? { ...g, text } : g);
      saveGoals(goals);
      const withText = goals.filter(g => g.text.trim());
      const done = withText.filter(g => g.done);
      const prog = document.getElementById('progressDisplay');
      prog.textContent = withText.length > 0 ? `${done.length}/${withText.length}` : '';
    }

    function addGoal() {
      const newGoal = { id: Date.now().toString(), text: '', done: false };
      goals = [...goals, newGoal];
      saveGoals(goals);
      render();
      setTimeout(() => {
        const inputs = document.querySelectorAll('input[type="text"]');
        inputs[inputs.length - 1]?.focus();
      }, 50);
    }

    function removeGoal(id) {
      if (goals.length <= 3) return;
      goals = goals.filter(g => g.id !== id);
      saveGoals(goals);
      render();
    }

    render();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
